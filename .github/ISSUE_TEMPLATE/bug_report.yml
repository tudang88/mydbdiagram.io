name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is happening?
      placeholder: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps so we can reproduce quickly.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happens?
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Always
        - Often
        - Sometimes
        - Rarely
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version / branch
      placeholder: e.g. v0.1.0, main-frontendonly

  - type: input
    id: environment
    attributes:
      label: Browser and OS
      placeholder: e.g. Chrome 128 on macOS 14

  - type: textarea
    id: evidence
    attributes:
      label: Logs / screenshots (optional)
      description: Paste console errors, network errors, or attach screenshots.

  - type: checkboxes
    id: checks
    attributes:
      label: Quick checks
      options:
        - label: I refreshed the page and retried.
        - label: I checked browser console for errors.
